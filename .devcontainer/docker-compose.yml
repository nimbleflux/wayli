services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: /bin/sh -c "while sleep 1000; do :; done"
    # When developing with local Fluxbase: comment out depends_on and use fluxbase-network
    # When developing Wayli standalone: uncomment depends_on and comment out networks
    # depends_on:
    #   - postgres
    #   - fluxbase
    environment:
      FLUXBASE_PUBLIC_BASE_URL: ${FLUXBASE_PUBLIC_BASE_URL:-http://localhost:8080}
      FLUXBASE_BASE_URL: ${FLUXBASE_BASE_URL:-http://fluxbase:8080}
      FLUXBASE_ANON_KEY: ${FLUXBASE_ANON_KEY}
      FLUXBASE_SERVICE_ROLE_KEY: ${FLUXBASE_SERVICE_ROLE_KEY}
      FLUXBASE_SERVER: ${FLUXBASE_BASE_URL:-http://fluxbase:8080}
      FLUXBASE_TOKEN: ${FLUXBASE_SERVICE_ROLE_KEY}
      FLUXBASE_ENCRYPTION_KEY: ${FLUXBASE_ENCRYPTION_KEY}
    ports:
      - '4000:4000'
    networks:
      - fluxbase-network

  # ============================================================================
  # STANDALONE SERVICES (for Wayli-only development)
  # Uncomment these services if developing Wayli without local Fluxbase source.
  # Also comment out the 'networks' section at the bottom and add this to 'dev':
  #   depends_on:
  #     - postgres
  #     - fluxbase
  # ============================================================================
  fluxbase:
    image: ghcr.io/fluxbase-eu/fluxbase:0.0.1-rc.114
    container_name: fluxbase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_data:/storage
      - ../fluxbase/functions:/functions
      - ../fluxbase/migrations:/migrations/user
    environment:
      # Database
      FLUXBASE_DATABASE_HOST: fluxbase-postgres
      FLUXBASE_DATABASE_PORT: 5432
      FLUXBASE_DATABASE_DATABASE: ${POSTGRES_DB:-fluxbase}
      FLUXBASE_DATABASE_USER: ${POSTGRES_USER:-fluxbase}
      FLUXBASE_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-fluxbase}
      FLUXBASE_DATABASE_SSL_MODE: disable

      # Required secrets (generate with: ./deploy/docker-compose/generate-keys.sh)
      FLUXBASE_AUTH_JWT_SECRET: ${FLUXBASE_AUTH_JWT_SECRET}
      FLUXBASE_ENCRYPTION_KEY: your-32-character-encryption-key
      FLUXBASE_SECURITY_SETUP_TOKEN: setup-token

      # Storage
      FLUXBASE_STORAGE_PROVIDER: local
      FLUXBASE_STORAGE_LOCAL_PATH: /app/storage
      FLUXBASE_CORS_ALLOWED_ORIGINS: http://localhost:4000

      # Enable features
      FLUXBASE_ADMIN_ENABLED: 'true'
      FLUXBASE_DEBUG: 'true'
    ports:
      - '8080:8080'
    networks:
      - fluxbase-network

  postgres:
    image: ghcr.io/fluxbase-eu/fluxbase-postgres:18
    # Or build locally: build: ./postgres
    container_name: fluxbase-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fluxbase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fluxbase}
      POSTGRES_DB: ${POSTGRES_DB:-fluxbase}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - fluxbase-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  fluxbase-network:

volumes:
  postgres_data:
  storage_data:
