services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - ~/Dev/fluxbase/sdk:/fluxbase-sdk:cached
      - ~/Dev/fluxbase/sdk-react:/fluxbase-sdk-react:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: /bin/sh -c "while sleep 1000; do :; done"
    # When developing with local Fluxbase: comment out depends_on and use fluxbase-dev-network
    # When developing Wayli standalone: uncomment depends_on and comment out networks
    # depends_on:
    #   - postgres
    #   - fluxbase
    environment:
      # For local Fluxbase development (shared network):
      - DATABASE_URL=postgresql://fluxbase_app:fluxbase_app_password@fluxbase-postgres-dev:5432/fluxbase_dev
      - FLUXBASE_BASE_URL=http://fluxbase-dev:8080
      - JWT_SECRET=dev-secret-key-change-in-production
      # For standalone Wayli development (uncomment these, comment above):
      # - DATABASE_URL=postgresql://fluxbase:postgres@postgres:5432/fluxbase
      # - FLUXBASE_BASE_URL=http://fluxbase-dev:8080
      # - JWT_SECRET=super-secret-jwt-token-with-at-least-32-characters-long
    ports:
      - '4000:4000'
    networks:
      - fluxbase-dev-network

  # ============================================================================
