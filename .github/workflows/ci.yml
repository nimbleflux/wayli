name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun pm ls @sveltejs/vite-plugin-svelte
          bun pm ls @sveltejs/kit
          bun pm ls vitest

      - name: Prepare SvelteKit
        working-directory: web
        run: bunx svelte-kit sync

      # - name: Lint
      #   working-directory: web
      #   run: bun run lint --if-present

      # - name: Type check
      #   working-directory: web
      #   run: |
      #     # Try the normal check first
      #     bun run check --if-present || {
      #       echo "⚠️ Type check failed, trying alternative approach..."
      #       # Fallback: run svelte-check directly
      #       bunx svelte-check --tsconfig ./tsconfig.json || {
      #         echo "❌ Type check failed even with fallback"
      #         exit 1
      #       }
      #     }

      - name: Run unit tests
        working-directory: web
        run: bun run test:unit -- --run --config vitest.ci.config.ts

      - name: Build app
        working-directory: web
        run: bun run build
