name: Release

# This workflow handles all release types: stable releases and release candidates (RC)
#
# Triggers:
#   1. Manual workflow_dispatch - Create a new release by specifying version and release type
#
# How to create a release:
#   1. Go to Actions â†’ Release â†’ Run workflow
#   2. Select branch (usually 'main')
#   3. Choose version_type (patch/minor/major)
#   4. Choose release_type (stable/rc)
#   5. Select which components to publish (all enabled by default)
#   6. Click "Run workflow"
#
# Version Examples:
#   - patch + stable:    1.0.10 â†’ 1.0.11
#   - minor + stable:    1.0.10 â†’ 1.1.0
#   - major + stable:    1.0.10 â†’ 2.0.0
#   - patch + rc:        1.0.10 â†’ 1.0.11-rc.1
#   - minor + rc:        1.0.10 â†’ 1.1.0-rc.1
#   - major + rc:        1.0.10 â†’ 2.0.0-rc.1
#   - continue + rc:     1.0.11-rc.1 â†’ 1.0.11-rc.2 (increment RC number)
#   - continue + stable: 1.0.11-rc.1 â†’ 1.0.11 (promote RC to stable)
#
# Component Toggles:
#   - Publish Docker image: Build and push the Wayli Docker image to GitHub Container Registry (GHCR)
#   - Publish Helm chart: Package and publish Helm chart to GHCR (OCI) and GitHub Pages
#
# RC Release behavior:
#   - Version format: vMAJOR.MINOR.PATCH-rc.N (e.g., v1.0.0-rc.1, v1.0.0-rc.2)
#   - Marked as GitHub pre-release
#   - Docker images tagged with version and 'rc' (NOT 'latest')
#   - Helm charts published with prerelease annotation
#
# Stable Release behavior:
#   - Version format: vMAJOR.MINOR.PATCH (e.g., v1.0.11)
#   - Marked as GitHub release (not pre-release)
#   - Docker images tagged with version and 'latest'
#   - Helm charts published normally

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - continue
        default: continue
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - stable
          - rc
        default: rc
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        default: false
        type: boolean
      publish_docker:
        description: 'Publish Docker image'
        required: false
        type: boolean
        default: true
      publish_helm:
        description: 'Publish Helm chart'
        required: false
        type: boolean
        default: true

permissions:
  packages: write
  contents: write
  pages: write
  id-token: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc_version.outputs.version }}
      is_rc: ${{ steps.calc_version.outputs.is_rc }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: calc_version
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./web/package.json').version")
          echo "Current version: $CURRENT_VERSION"

          VERSION_TYPE="${{ inputs.version_type }}"
          RELEASE_TYPE="${{ inputs.release_type }}"

          # Parse current version (handles both stable and RC versions)
          if [[ "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-rc\.([0-9]+))?$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            RC_SUFFIX="${BASH_REMATCH[4]}"
            RC_NUM="${BASH_REMATCH[5]:-0}"
            if [ -n "$RC_SUFFIX" ]; then
              IS_CURRENT_RC="true"
            else
              IS_CURRENT_RC="false"
            fi
          else
            echo "Error: Cannot parse version $CURRENT_VERSION"
            exit 1
          fi

          echo "Parsed: MAJOR=$MAJOR, MINOR=$MINOR, PATCH=$PATCH, RC_SUFFIX=$RC_SUFFIX, RC_NUM=$RC_NUM, IS_CURRENT_RC=$IS_CURRENT_RC"

          IS_RC="false"
          if [ "$RELEASE_TYPE" = "rc" ]; then
            IS_RC="true"
          fi

          # Handle 'continue' specially - it requires current version to be an RC
          if [ "$VERSION_TYPE" = "continue" ]; then
            if [ "$IS_CURRENT_RC" != "true" ]; then
              echo "Error: 'continue' requires current version to be an RC (current: $CURRENT_VERSION)"
              echo "Use patch/minor/major to create a new version instead."
              exit 1
            fi
            BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            if [ "$IS_RC" = "true" ]; then
              # Continue RC series: increment RC number
              NEW_VERSION="${BASE_VERSION}-rc.$((RC_NUM + 1))"
            else
              # Promote RC to stable: strip RC suffix
              NEW_VERSION="${BASE_VERSION}"
            fi
          else
            # Calculate base version based on version_type
            case "$VERSION_TYPE" in
              major)
                BASE_VERSION="$((MAJOR + 1)).0.0"
                ;;
              minor)
                BASE_VERSION="${MAJOR}.$((MINOR + 1)).0"
                ;;
              patch)
                BASE_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
                ;;
              *)
                echo "Error: Unknown version_type '$VERSION_TYPE'"
                exit 1
                ;;
            esac

            # Apply RC suffix if needed
            if [ "$IS_RC" = "true" ]; then
              NEW_VERSION="${BASE_VERSION}-rc.1"
            else
              NEW_VERSION="$BASE_VERSION"
            fi
          fi

          echo "New version: $NEW_VERSION"
          echo "Is RC: $IS_RC"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "is_rc=$IS_RC" >> $GITHUB_OUTPUT

  release:
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
      IS_RC: ${{ needs.get-version.outputs.is_rc }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Fluxbase CLI
        run: curl -fsSL https://raw.githubusercontent.com/fluxbase-eu/fluxbase/main/install-cli.sh | bash

      - name: Prepare SvelteKit
        working-directory: web
        run: npx svelte-kit sync

      - name: Run unit tests
        working-directory: web
        run: npm run test

      - name: Build app
        working-directory: web
        run: npm run build --if-present

      - name: Display version info
        run: |
          echo "Version: ${{ env.VERSION }}"
          echo "Is RC: ${{ env.IS_RC }}"
          echo "Dry run: ${{ inputs.dry_run }}"

      - name: Update package.json version
        if: inputs.dry_run == false
        working-directory: web
        run: |
          npm version ${{ env.VERSION }} --no-git-tag-version
          echo "Updated package.json to version ${{ env.VERSION }}"

      - name: Update deployment files with new version
        if: inputs.dry_run == false
        run: |
          # Update Helm Chart.yaml with new appVersion
          sed -i "s/^appVersion: .*/appVersion: \"v${{ env.VERSION }}\"/" charts/wayli/Chart.yaml
          echo "Updated Helm chart appVersion to v${{ env.VERSION }}"

          # Update Supabase functions init container image in values.yaml
          sed -i "s|image: ghcr.io/wayli-app/wayli:.*|image: ghcr.io/wayli-app/wayli:v${{ env.VERSION }}|" charts/wayli/values.yaml
          echo "Updated init container image to v${{ env.VERSION }}"

          # Update docker-compose .env.example with new version
          sed -i "s/^WAYLI_VERSION=.*/WAYLI_VERSION=v${{ env.VERSION }}/" deploy/docker-compose/.env.example
          echo "Updated docker-compose to version v${{ env.VERSION }}"

      - name: Commit and tag release
        if: inputs.dry_run == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add web/package.json web/package-lock.json charts/wayli/Chart.yaml charts/wayli/values.yaml deploy/docker-compose/.env.example
          git commit -m "chore(release): v${{ env.VERSION }}"
          git tag v${{ env.VERSION }}
          git push
          git push --tags

          echo "Committed and tagged v${{ env.VERSION }}"

      - name: Create GitHub Release
        if: inputs.dry_run == false
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          prerelease: ${{ env.IS_RC == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Docker Image Publishing (Split by Architecture)
  # ==========================================================================

  publish-docker-amd64:
    name: Build Docker Image (AMD64)
    runs-on: ubuntu-latest
    needs: [get-version, release]
    if: inputs.dry_run == false && inputs.publish_docker
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/wayli-app/wayli:v${{ env.VERSION }}-amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  publish-docker-arm64:
    name: Build Docker Image (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: [get-version, release]
    if: inputs.dry_run == false && inputs.publish_docker
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/wayli-app/wayli:v${{ env.VERSION }}-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  publish-docker-manifest:
    name: Create Docker Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: [get-version, publish-docker-amd64, publish-docker-arm64]
    if: inputs.dry_run == false && inputs.publish_docker
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
      IS_RC: ${{ needs.get-version.outputs.is_rc }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Create and push multi-arch manifest
        run: |
          # Create manifest for version tag
          docker buildx imagetools create -t ghcr.io/wayli-app/wayli:v${{ env.VERSION }} \
            ghcr.io/wayli-app/wayli:v${{ env.VERSION }}-amd64 \
            ghcr.io/wayli-app/wayli:v${{ env.VERSION }}-arm64

          # Create manifest for latest/rc tag
          if [ "${{ env.IS_RC }}" = "true" ]; then
            docker buildx imagetools create -t ghcr.io/wayli-app/wayli:rc \
              ghcr.io/wayli-app/wayli:v${{ env.VERSION }}-amd64 \
              ghcr.io/wayli-app/wayli:v${{ env.VERSION }}-arm64
          else
            docker buildx imagetools create -t ghcr.io/wayli-app/wayli:latest \
              ghcr.io/wayli-app/wayli:v${{ env.VERSION }}-amd64 \
              ghcr.io/wayli-app/wayli:v${{ env.VERSION }}-arm64
          fi

          # Create manifest for short SHA tag
          docker buildx imagetools create -t ghcr.io/wayli-app/wayli:${{ env.SHORT_SHA }} \
            ghcr.io/wayli-app/wayli:v${{ env.VERSION }}-amd64 \
            ghcr.io/wayli-app/wayli:v${{ env.VERSION }}-arm64

  # ==========================================================================
  # Helm Chart Publishing
  # ==========================================================================

  publish-helm-chart:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [get-version, release]
    if: inputs.dry_run == false && inputs.publish_helm
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
      IS_RC: ${{ needs.get-version.outputs.is_rc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main  # Checkout main to get the latest committed changes from release job

      - name: Pull latest changes
        run: git pull origin main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Update chart dependencies
        run: |
          # Clean existing dependencies and lock file to avoid stale cache issues
          rm -rf charts/wayli/charts/*
          rm -f charts/wayli/Chart.lock

          # Clear Helm cache
          rm -rf ~/.cache/helm

          # OCI-based dependencies don't need helm repo add
          # Update dependencies (regenerates Chart.lock and downloads deps)
          helm dependency update charts/wayli

      - name: Bump chart version
        run: |
          # Use the same version as the app (already calculated by get-version job)
          NEW_VERSION="${{ env.VERSION }}"
          IS_RC="${{ env.IS_RC }}"

          echo "đź“¦ Setting chart version to: $NEW_VERSION"

          # Update Chart.yaml version
          sed -i "s/^version: .*/version: $NEW_VERSION/" charts/wayli/Chart.yaml

          # Add prerelease annotation for RC versions
          if [ "$IS_RC" = "true" ]; then
            # Check if annotations section exists
            if grep -q "^annotations:" charts/wayli/Chart.yaml; then
              # Add to existing annotations (only if not already present)
              if ! grep -q "artifacthub.io/prerelease" charts/wayli/Chart.yaml; then
                sed -i '/^annotations:/a\  artifacthub.io/prerelease: "true"' charts/wayli/Chart.yaml
              fi
            else
              # Add new annotations section
              echo -e "\nannotations:\n  artifacthub.io/prerelease: \"true\"" >> charts/wayli/Chart.yaml
            fi
          else
            # Remove prerelease annotation for stable releases
            sed -i '/artifacthub.io\/prerelease/d' charts/wayli/Chart.yaml
            # Remove empty annotations section if it exists
            sed -i '/^annotations:$/{ N; /^annotations:\n$/d }' charts/wayli/Chart.yaml
          fi

          # Commit the version bump
          git add charts/wayli/Chart.yaml
          git commit -m "chore(chart): Bump version to $NEW_VERSION [skip ci]"
          git push

          echo "đź“¦ Chart version set to $NEW_VERSION"
          echo "CHART_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Package Helm chart
        run: |
          mkdir -p .cr-release-packages
          helm package charts/wayli -d .cr-release-packages

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to GHCR (OCI)
        run: |
          helm push .cr-release-packages/wayli-${{ env.VERSION }}.tgz oci://ghcr.io/wayli-app/charts
          echo "đź“¦ Helm chart pushed to ghcr.io/wayli-app/charts/wayli:${{ env.VERSION }}"

      - name: Install chart-releaser
        run: |
          curl -sSLo cr.tar.gz "https://github.com/helm/chart-releaser/releases/download/v1.6.1/chart-releaser_1.6.1_linux_amd64.tar.gz"
          tar -xzf cr.tar.gz
          sudo mv cr /usr/local/bin/cr

      - name: Upload chart to GitHub Release
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cr upload \
            --owner wayli-app \
            --git-repo wayli \
            --package-path .cr-release-packages \
            --release-name-template "chart-{{ .Version }}" \
            --skip-existing

      - name: Update Helm repository index
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .cr-index

          # Fetch existing index from gh-pages if it exists
          if git fetch origin gh-pages:gh-pages 2>/dev/null; then
            git show gh-pages:index.yaml > .cr-index/index.yaml 2>/dev/null || true
          fi

          # Generate/update index (must use same release-name-template as upload)
          cr index \
            --owner wayli-app \
            --git-repo wayli \
            --package-path .cr-release-packages \
            --index-path .cr-index/index.yaml \
            --release-name-template "chart-{{ .Version }}"

      - name: Deploy index.yaml to gh-pages
        run: |
          # Copy the generated index.yaml to a temporary location
          cp .cr-index/index.yaml /tmp/index.yaml

          # Stash any local changes before switching branches
          git stash --include-untracked

          # Checkout gh-pages branch
          if git fetch origin gh-pages:gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          # Copy the index.yaml from temp to root
          cp /tmp/index.yaml index.yaml
          git add index.yaml
          git commit -m "Update Helm repository index [skip ci]" || echo "No changes to commit"
          git push origin gh-pages
