name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - rc
        default: patch
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        default: false
        type: boolean

permissions:
  packages: write
  contents: write
  id-token: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc_version.outputs.version }}
      is_rc: ${{ steps.calc_version.outputs.is_rc }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: calc_version
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./web/package.json').version")
          echo "Current version: $CURRENT_VERSION"

          BUMP_TYPE="${{ inputs.bump_type }}"

          # Parse current version (handles both stable and RC versions)
          if [[ "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-rc\.([0-9]+))?$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            RC_NUM="${BASH_REMATCH[5]:-0}"
          else
            echo "Error: Cannot parse version $CURRENT_VERSION"
            exit 1
          fi

          IS_RC="false"

          case "$BUMP_TYPE" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
            rc)
              IS_RC="true"
              if [[ "$CURRENT_VERSION" == *"-rc."* ]]; then
                # Already an RC, increment RC number
                NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-rc.$((RC_NUM + 1))"
              else
                # First RC for next patch version
                NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-rc.1"
              fi
              ;;
          esac

          echo "New version: $NEW_VERSION"
          echo "Is RC: $IS_RC"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "is_rc=$IS_RC" >> $GITHUB_OUTPUT

  release:
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
      IS_RC: ${{ needs.get-version.outputs.is_rc }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Prepare SvelteKit
        working-directory: web
        run: npx svelte-kit sync

      - name: Run unit tests
        working-directory: web
        run: npm run test

      - name: Build app
        working-directory: web
        run: npm run build --if-present

      - name: Display version info
        run: |
          echo "Version: ${{ env.VERSION }}"
          echo "Is RC: ${{ env.IS_RC }}"
          echo "Dry run: ${{ inputs.dry_run }}"

      - name: Update package.json version
        if: inputs.dry_run == false
        working-directory: web
        run: |
          npm version ${{ env.VERSION }} --no-git-tag-version
          echo "Updated package.json to version ${{ env.VERSION }}"

      - name: Set up Docker Buildx
        if: inputs.dry_run == false
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: inputs.dry_run == false
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract short SHA
        if: inputs.dry_run == false
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build and push Docker image
        if: inputs.dry_run == false
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            zehbart/wayli:v${{ env.VERSION }}
            ${{ env.IS_RC == 'true' && 'zehbart/wayli:rc' || 'zehbart/wayli:latest' }}
            zehbart/wayli:${{ env.SHORT_SHA }}

      - name: Update deployment files with new version
        if: inputs.dry_run == false
        run: |
          # Update Helm Chart.yaml with new appVersion
          sed -i "s/^appVersion: .*/appVersion: \"v${{ env.VERSION }}\"/" charts/wayli/Chart.yaml
          echo "Updated Helm chart appVersion to v${{ env.VERSION }}"

          # Update Supabase functions init container image in values.yaml
          sed -i "s|image: zehbart/wayli:.*|image: zehbart/wayli:v${{ env.VERSION }}|" charts/wayli/values.yaml
          echo "Updated init container image to v${{ env.VERSION }}"

          # Update docker-compose .env.example with new version
          sed -i "s/^WAYLI_VERSION=.*/WAYLI_VERSION=v${{ env.VERSION }}/" deploy/docker-compose/.env.example
          echo "Updated docker-compose to version v${{ env.VERSION }}"

      - name: Commit and tag release
        if: inputs.dry_run == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add web/package.json web/package-lock.json charts/wayli/Chart.yaml charts/wayli/values.yaml deploy/docker-compose/.env.example
          git commit -m "chore(release): v${{ env.VERSION }}"
          git tag v${{ env.VERSION }}
          git push
          git push --tags

          echo "Committed and tagged v${{ env.VERSION }}"

      - name: Create GitHub Release
        if: inputs.dry_run == false
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          prerelease: ${{ env.IS_RC == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
