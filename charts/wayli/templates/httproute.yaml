{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.gateway.routeName | default (include "wayli.fullname" .) }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "wayli.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
    {{- with .Values.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if or .Values.gateway.annotations .Values.global.annotations }}
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.gateway.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.gateway.parentRefs }}
    {{- if .name }}
    - name: {{ .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
    {{- end }}
    {{- end }}
  {{- if or .Values.gateway.hostname .Values.gateway.extraHostnames }}
  hostnames:
    {{- with .Values.gateway.hostname }}
    - {{ . | quote }}
    {{- end }}
    {{- range .Values.gateway.extraHostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .Values.gateway.pathType }}
            value: {{ .Values.gateway.path }}
      backendRefs:
        - name: {{ include "wayli.fullname" . }}-web
          port: {{ .Values.web.service.port }}
    {{- with .Values.gateway.extraRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
