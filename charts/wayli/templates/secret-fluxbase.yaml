{{- if not .Values.fluxbase.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wayli.fullname" . }}-fluxbase
  labels:
    {{- include "wayli.labels" . | nindent 4 }}
  {{- with .Values.global.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- /* JWT secret */}}
  {{ .Values.fluxbase.existingSecretKeyRef.jwtSecret }}: {{ .Values.fluxbase.config.auth.jwt_secret | b64enc | quote }}
  {{- /* Setup token (optional) */}}
  {{- if .Values.fluxbase.config.security.setup_token }}
  {{ .Values.fluxbase.existingSecretKeyRef.setupToken }}: {{ .Values.fluxbase.config.security.setup_token | b64enc | quote }}
  {{- end }}
  {{- /* Database password */}}
  {{ .Values.fluxbase.existingSecretKeyRef.databasePassword }}: {{ .Values.fluxbase.postgresql.auth.password | b64enc | quote }}
  {{- /* SMTP password (if configured) */}}
  {{- if .Values.fluxbase.config.email.smtp_password }}
  {{ .Values.fluxbase.existingSecretKeyRef.smtpPassword }}: {{ .Values.fluxbase.config.email.smtp_password | b64enc | quote }}
  {{- end }}
{{- end }}
