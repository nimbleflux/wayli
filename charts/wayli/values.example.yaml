# Wayli Helm Chart - Example Values
#
# Secret Generation:
#   Run ./generate-secrets.sh to generate Kubernetes secrets for Fluxbase
#
# Documentation:
#   See charts/wayli/README.md for full configuration options

## Web deployment
web:
  ## Environment variables
  env:
    ## Site URL for CORS and trusted origins (you MUST set this)
    siteUrl: 'https://your-domain.com'

## Worker deployment (StatefulSet)
worker:
  ## Environment variables
  env:
    ## External service endpoints
    pelias:
      endpoint: 'https://pelias.wayli.app'

## Wayli ingress configuration
ingress:
  enabled: true
  ingressClassName: nginx
  hostname: wayli.your-domain.com
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'

## Fluxbase dependency configuration
## See: https://github.com/fluxbase-eu/fluxbase for full configuration options
fluxbase:
  enabled: true

  ## Global parameters
  global:
    storageClass: 'local-path'

  ## Fluxbase application configuration
  config:
    ## Public base URL for the application (you MUST set this)
    base_url: 'https://flux.your-domain.com'

    ## Authentication configuration
    auth:
      jwt_expiry: '1h'
      refresh_expiry: '168h'
      enable_signup: true
      enable_magic_link: true
      totp_issuer: 'Wayli'

    ## CORS configuration
    cors:
      allowed_origins:
        - 'https://your-domain.com'
        - 'https://wayli.your-domain.com'
      allow_credentials: true

    ## Storage configuration
    storage:
      provider: 'local'
      local_path: '/data/storage'
      max_upload_size: 1073741824  # 1GB
      default_buckets:
        - 'trip-images'

    ## Realtime/WebSocket configuration
    realtime:
      enabled: true
      max_connections: 1000

    ## Email configuration (optional)
    email:
      enabled: true
      provider: 'smtp'
      from_address: 'noreply@your-domain.com'
      from_name: 'Wayli'
      smtp_host: 'smtp.your-domain.com'
      smtp_port: 587
      smtp_tls: true
      # smtp_username and smtp_password should be in existingSecret

    ## Edge Functions configuration
    functions:
      enabled: true
      functions_dir: '/app/functions'
      auto_load_on_boot: true

    ## Background Jobs configuration
    jobs:
      enabled: true
      worker_mode: 'embedded'
      embedded_worker_count: 4

    ## Logging configuration
    logging:
      console_enabled: true
      console_level: 'info'
      console_format: 'json'
      backend: 'postgres'
      pubsub_enabled: true
      retention_enabled: true

    ## Admin dashboard configuration
    admin:
      enabled: false

  ## Existing secret for sensitive configuration (you MUST create this secret)
  ## Should contain keys: jwt-secret, setup-token, database-password, smtp-password
  existingSecret: *fluxbaseSecret

  ## Custom key names for existingSecret
  existingSecretKeyRef:
    jwtSecret: 'jwt-secret'
    setupToken: 'setup-token'
    databasePassword: 'database-password'
    smtpPassword: 'smtp-password'

  ## Resource configuration
  resourcesPreset: 'small'

  ## Persistence configuration
  persistence:
    enabled: true
    storageClass: 'local-path'
    size: 50Gi

  ## Ingress configuration for Fluxbase API
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: 'flux.your-domain.com'  # Use the same as config.base_url
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: 'true'
      nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
      nginx.ingress.kubernetes.io/backend-protocol: 'HTTP'
      nginx.ingress.kubernetes.io/proxy-body-size: '1g'
      nginx.ingress.kubernetes.io/proxy-connect-timeout: '3600'
      nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
      nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    tls: false

  ## PostgreSQL configuration (bundled)
  postgresql:
    enabled: true
    auth:
      database: fluxbase
      username: fluxbase
      existingSecret: *fluxbaseSecret
    persistence:
      enabled: true
      size: 20Gi
      storageClass: 'local-path'
    resources:
      requests:
        memory: 512Mi
        cpu: '250m'
      limits:
        memory: 2Gi
        cpu: '2'
