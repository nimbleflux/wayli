# Wayli Helm Chart - Example Values
#
# Secret Generation:
#   Run ./generate-secrets.sh to generate Kubernetes secrets for Fluxbase
#
# Documentation:
#   See charts/wayli/README.md for full configuration options

global:
  ## Shared secret name anchor for Fluxbase
  fluxbaseSecretName: fluxbase-secret

## Web deployment
web:
  ## Environ1ment variables
  env:
    ## Site URL for CORS and trusted origins (you MUST set this)
    siteUrl: 'https://wayli.int.example.com'

## Worker deployment (StatefulSet)
worker:
  ## Environment variables
  env:
    ## External service endpoints
    pelias:
      endpoint: 'https://pelias.wayli.app'

# Gateway API configuration for Wayli web interface
httpRoute:
  enabled: true
  parentRefs:
    - name: internal-gateway
      namespace: nginx-gateway
      sectionName: https
  hostname: wayli.int.example.com
  path: /
  pathType: PathPrefix

# ## Wayli ingress configuration
# ingress:
#   enabled: true
#   ingressClassName: nginx
#   hostname: wayli.your-domain.com
#   annotations:
#     nginx.ingress.kubernetes.io/rewrite-target: /
#     nginx.ingress.kubernetes.io/ssl-redirect: 'true'

## Fluxbase dependency configuration
## See: https://github.com/nimbleflux/fluxbase for full configuration options
fluxbase:
  global:
    storageClass: "local-storage"

  extraEnvVars:
    - name: DENO_DIR
      value: "/tmp/deno"
    - name: HOME
      value: "/tmp"
  extraVolumes:
    - name: deno-cache
      emptyDir: {}

  extraVolumeMounts:
    - name: deno-cache
      mountPath: /tmp/deno
  replicaCount: 1

  httpRoute:
    enabled: true
    parentRefs:
      - name: public-gateway
        namespace: nginx-gateway
        sectionName: https-example-com
    hostname: flux.example.com
    path: /
    pathType: PathPrefix
    annotations:
      nginx.org/client-max-body-size: "0"  # Unlimited body size for uploads

  # Persistence for Fluxbase storage (local file storage). This is mounted to /data/storage
  persistence:
    enabled: true
    size: 50Gi
    storageClass: "local-storage"
    existingClaim: "wayli-fluxbase-storage-pvc"

  ## Fluxbase application configuration
  config:
    ## REQUIRED: Public base URL for the application
    ## This is used for generating links in emails, OAuth callbacks, etc.
    base_url: "https://flux.example.com"

    ai:
      enabled: true

    ## CORS configuration
    cors:
      allowed_origins:
        - "https://flux.example.com"
        - "https://wayli.int.example.com"

  ## Secret containing sensitive values (REQUIRED)
  ## See the kubectl command at the top of this file
  existingSecret: &fluxbaseSecret "fluxbase-secret"

  ## Resource configuration
  resourcesPreset: "small"

  # ## Ingress configuration
  # ingress:
  #   enabled: true
  #   ingressClassName: nginx
  #   hostname: "flux.example.com"
  #   annotations:
  #     nginx.ingress.kubernetes.io/proxy-body-size: "1g"
  #     nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  #     nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  #   tls: false # Set to true if using cert-manager or providing TLS secrets

  ## PostgreSQL (bundled)
  ## You can specify runtime credentials, admin credentials, or both.
  ## If only one set is provided, the other will use the same credentials.
  postgresql:
    enabled: true
    auth:
      database: wayli
      ## Runtime user for normal queries (optional, falls back to adminUsername)
      # username: fluxbase
      ## Admin user for migrations (optional, falls back to username)
      # adminUsername: postgres
      existingSecret: *fluxbaseSecret
      secretKeys:
        username: db-username
        password: db-password
        # adminUsername: db-admin-username  # Optional
        # adminPassword: db-admin-password  # Optional
    persistence:
      enabled: true
      size: 10Gi
      existingClaim: *fluxbaseSecret
