## Global parameters
global:
  ## Additional labels to apply to all resources
  labels: {}
  ## Additional annotations to apply to all resources
  annotations: {}

## Secrets configuration
## Note: Secret names are configured in fluxbase.global.fluxbase.existingSecret
## and fluxbase.global.fluxbase.auth.smtp.existingSecret
secrets:
  ## SMTP secret keys (for creating secrets from values.yaml in non-production)
  smtp:
    secretKeys:
      username: "username"
      password: "password"
    values:
      username: ""
      password: ""

## Image configuration
image:
  repository: zehbart/wayli
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to .Chart.AppVersion
  ## Optional image pull secrets
  # pullSecrets:
  #   - myRegistryKeySecretName

## Name overrides
nameOverride: ""
fullnameOverride: ""

## Deployment mode configuration
## - combined: Run web and worker in the same pod (default, simpler for small deployments)
## - split: Run web and worker as separate deployments (recommended for high-scale production)
deploymentMode: combined

## Web deployment
web:
  enabled: true
  replicaCount: 1

  ## Update strategy
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  ## Init containers for migrations
  initContainers:
    waitForDb:
      enabled: true
      image:
        repository: postgres
        tag: "16-alpine"
        pullPolicy: IfNotPresent
    migrations:
      enabled: true
      flywayImage:
        repository: flyway/flyway
        tag: "11-alpine"
        pullPolicy: IfNotPresent
    waitForFluxbase:
      enabled: true
      image:
        repository: busybox
        tag: "1.36"
        pullPolicy: IfNotPresent

  ## Extra init containers (prepended before standard init containers)
  ## Specify as a list of container definitions
  extraInitContainers: []
  #  - name: custom-init
  #    image: busybox:latest
  #    command: ['sh', '-c', 'echo "Custom init container"']

  ## Environment variables
  env:
    nodeEnv: production
    appMode: web
    host: "0.0.0.0"
    port: "80"
    ## Site URL for CORS and trusted origins
    siteUrl: "https://wayli.app"

  ## Extra environment variables (Bitnami-style)
  ## Specify as list of objects with name/value pairs
  extraEnvVars: []
  #  - name: FOO
  #    value: "bar"

  ## Extra environment variables from ConfigMap/Secret
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""

  ## Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
    ## Additional service ports
    extraPorts: []
    ## Service annotations
    annotations: {}
    ## Service labels
    labels: {}

  ## Resource limits and requests
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  ## Horizontal Pod Autoscaler
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70
    targetMemory: 80
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 50
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 75
            periodSeconds: 60

  ## Pod Disruption Budget
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1

  ## Liveness and readiness probes
  livenessProbe:
    enabled: false
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1

  readinessProbe:
    enabled: false
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

  ## Lifecycle hooks
  lifecycleHooks: {}

  ## Pod annotations
  podAnnotations: {}

  ## Pod labels
  podLabels: {}

  ## Affinity for pod assignment
  affinity: {}
  ## Node labels for pod assignment
  nodeSelector: {}
  ## Tolerations for pod assignment
  tolerations: []

  ## Priority class name
  priorityClassName: ""

  ## Termination grace period
  terminationGracePeriodSeconds: 60

  ## Extra volumes
  extraVolumes: []
  #  - name: extra-volume
  #    emptyDir: {}

  ## Extra volume mounts
  extraVolumeMounts: []
  #  - name: extra-volume
  #    mountPath: /extra

## Worker deployment (StatefulSet)
worker:
  enabled: true
  replicaCount: 2

  ## Update strategy for StatefulSet
  updateStrategy:
    type: RollingUpdate

  ## Pod management policy
  podManagementPolicy: OrderedReady

  ## Environment variables
  env:
    nodeEnv: production
    appMode: worker
    ## Worker concurrency configuration
    ## Maximum number of concurrent jobs per worker pod (default: 3)
    ## Adjust based on your resource limits and job characteristics
    ## Recommended: 2-3 for CPU-intensive jobs, 3-5 for I/O-bound jobs
    maxConcurrentJobs: 3
    ## Maximum number of job retries before marking as failed (default: 3)
    maxJobRetries: 3
    ## External service endpoints
    pelias:
      endpoint: "http://pelias.pelias.svc.cluster.local:4000"

  ## Extra environment variables
  extraEnvVars: []
  extraEnvVarsCM: ""
  extraEnvVarsSecret: ""

  ## Extra init containers (prepended before standard init containers)
  ## Specify as a list of container definitions
  extraInitContainers: []
  #  - name: custom-init
  #    image: busybox:latest
  #    command: ['sh', '-c', 'echo "Custom init container"']

  ## Service (headless for StatefulSet)
  service:
    enabled: true
    type: ClusterIP
    clusterIP: None  # Headless service
    annotations: {}
    labels: {}

  ## Resources
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "1"

  ## Lifecycle hooks
  lifecycleHooks:
    preStop:
      exec:
        command: ["/bin/sh", "-c", "sleep 5"]

  ## Termination grace period (longer for workers to finish jobs)
  terminationGracePeriodSeconds: 45

  ## HPA for workers
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 30
    targetMemory: 80
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 900  # 15 min
        policies:
          - type: Percent
            value: 25
            periodSeconds: 300
          - type: Pods
            value: 1
            periodSeconds: 300
        selectPolicy: Min
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 100
            periodSeconds: 60
          - type: Pods
            value: 2
            periodSeconds: 60
        selectPolicy: Max

  ## Pod Disruption Budget
  podDisruptionBudget:
    enabled: false
    minAvailable: 2

  ## Probes
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false

  podAnnotations: {}
  podLabels: {}
  affinity: {}
  nodeSelector: {}
  tolerations: []
  priorityClassName: ""

  ## Extra volumes and mounts
  extraVolumes: []
  extraVolumeMounts: []

## Ingress configuration
ingress:
  # Enable ingress
  enabled: true
  # Ingress class name
  ingressClassName: nginx
  # Additional ingress labels
  labels: {}
  # Additional ingress annotations
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # Hostname (optional - if not set, use extraRules)
  hostname: ""
  # Path
  path: /
  # Path type
  pathType: Prefix
  # TLS configuration
  tls: []
  # Additional ingress hosts
  extraHosts: []
  # Additional ingress paths
  extraPaths: []
  # Additional ingress rules
  extraRules: []
  # Additional TLS configurations
  extraTls: []

## Gateway API configuration (HTTPRoute)
## Requires Gateway API CRDs and a GatewayClass/Gateway to be installed
## See: https://gateway-api.sigs.k8s.io/
gateway:
  # Enable Gateway API HTTPRoute (disabled by default)
  enabled: false
  # Additional HTTPRoute labels
  labels: {}
  # Additional HTTPRoute annotations
  annotations: {}
  # Parent Gateway reference (required when enabled)
  # The Gateway must already exist and have a matching listener
  parentRefs:
    - name: ""
      # Namespace of the Gateway (optional, defaults to HTTPRoute namespace)
      namespace: ""
      # Specific listener name on the Gateway (optional)
      sectionName: ""
  # Hostname for the HTTPRoute
  hostname: ""
  # Additional hostnames
  extraHostnames: []
  # Path match type: PathPrefix, Exact, or RegularExpression
  pathType: PathPrefix
  # Path value
  path: /
  # Additional routing rules (for advanced use cases like traffic splitting)
  extraRules: []

## External Fluxbase configuration
## Only set these if using an external/managed Fluxbase instance (not the subchart)
externalFluxbase:
  ## Set to true to use external Fluxbase instead of the subchart
  enabled: false
  ## Public Fluxbase URL (API endpoint)
  url: ""
  ## Database connection details (for migrations and workers)
  dbHost: ""
  dbPort: 5432
  dbName: "postgres"
  dbUser: "postgres"

## Pod Security Context (enabled by default for non-root)
podSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

## Container Security Context
containerSecurityContext:
  enabled: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

## Service Account
serviceAccount:
  create: true
  ## Service account name
  name: ""
  ## Annotations
  annotations: {}
  ## Auto-mount service account token
  automountServiceAccountToken: true

## Fluxbase dependency configuration
## See: https://github.com/fluxbase-eu/fluxbase/blob/main/deploy/helm/fluxbase/values.yaml
fluxbase:
  enabled: true

  ## Global parameters
  global:
    storageClass: "standard"

  ## Fluxbase application configuration
  ## All settings under fluxbase.* are passed as environment variables with FLUXBASE_ prefix
  fluxbase:
    ## Public base URL for the application
    base_url: "https://flux.wayli.app"

    ## Server configuration
    server:
      address: ":8080"
      read_timeout: "300s"
      write_timeout: "300s"
      idle_timeout: "120s"
      body_limit: 2147483648

    ## Database configuration
    ## Note: host, port, user are auto-determined from postgresql.* section
    database:
      ssl_mode: "disable"
      max_connections: 25
      min_connections: 5
      max_conn_lifetime: "1h"
      max_conn_idle_time: "30m"
      health_check_period: "1m"

    ## Authentication configuration
    auth:
      jwt_secret: ""  # Use existingSecret in production
      anon_key: ""    # Pre-signed JWT for client apps
      jwt_expiry: "1h"
      refresh_expiry: "168h"
      magic_link_expiry: "15m"
      password_reset_expiry: "1h"
      password_min_length: 8
      bcrypt_cost: 10
      enable_signup: true
      enable_magic_link: true
      totp_issuer: "Wayli"

    ## Security configuration
    security:
      enable_global_rate_limit: false
      setup_token: ""  # Use existingSecret in production
      admin_setup_rate_limit: 5
      admin_setup_rate_window: "1m"
      auth_login_rate_limit: 10
      auth_login_rate_window: "1m"

    ## CORS configuration
    cors:
      allowed_origins:
        - "https://wayli.app"
      allowed_methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "PATCH"
        - "OPTIONS"
      allowed_headers:
        - "*"
      allow_credentials: true
      max_age: 86400

    ## Storage configuration
    storage:
      provider: "local"
      local_path: "/data/storage"
      max_upload_size: 1073741824
      default_buckets:
        - "trip-images"

    ## Realtime/WebSocket configuration
    realtime:
      enabled: true
      max_connections: 1000
      ping_interval: "30s"
      pong_timeout: "60s"

    ## Email configuration
    email:
      enabled: false
      provider: "smtp"
      from_address: "noreply@wayli.app"
      from_name: "Wayli"
      reply_to_address: ""
      smtp_host: ""
      smtp_port: 587
      smtp_username: ""
      smtp_password: ""  # Use existingSecret in production
      smtp_tls: true

    ## Edge Functions configuration
    functions:
      enabled: true
      functions_dir: "/app/functions"
      auto_load_on_boot: true
      default_timeout: 30
      max_timeout: 300

    ## Background Jobs configuration
    jobs:
      enabled: true
      jobs_dir: "/app/jobs"
      auto_load_on_boot: true
      worker_mode: "embedded"
      embedded_worker_count: 4

    ## Logging configuration
    logging:
      console_enabled: true
      console_level: "info"
      console_format: "json"
      backend: "postgres"
      pubsub_enabled: true
      retention_enabled: true

    ## Admin dashboard configuration
    admin:
      enabled: false

  ## Existing secret for sensitive configuration
  ## Should contain keys: jwt-secret, setup-token, database-password, smtp-password, etc.
  existingSecret: ""

  ## Custom key names for existingSecret
  existingSecretKeyRef:
    jwtSecret: "jwt-secret"
    setupToken: "setup-token"
    databasePassword: "database-password"
    smtpPassword: "smtp-password"

  ## Deployment configuration
  replicaCount: 1

  ## Resource configuration
  resourcesPreset: "small"
  resources: {}

  ## Persistence configuration
  persistence:
    enabled: true
    storageClass: ""
    size: 50Gi

  ## Service configuration
  service:
    type: ClusterIP
    ports:
      http: 8080

  ## Ingress configuration
  ingress:
    enabled: false
    ingressClassName: nginx
    hostname: ""
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/proxy-body-size: "1g"
    tls: []

  ## PostgreSQL configuration (bundled)
  postgresql:
    enabled: true
    auth:
      database: fluxbase
      username: fluxbase
      password: ""  # Use existingSecret in production
      existingSecret: ""
    primary:
      persistence:
        size: 20Gi
