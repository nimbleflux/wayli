# Wayli with Fluxbase - Simplified Backend
#
# Secret Generation:
#   Run ./generate-secrets.sh to generate required secrets (.env file)
#
# Usage:
#   Start:    docker compose up
#   Stop:     docker compose down
#   Destroy:  docker compose down -v --remove-orphans

name: wayli-fluxbase

services:
  # Wayli web application
  wayli-web:
    container_name: wayli-web
    image: ghcr.io/wayli-app/wayli:${WAYLI_VERSION:-latest}
    restart: unless-stopped
    ports:
      - '${PORT:-4000}:80'
    environment:
      NODE_ENV: production
      HOST: '0.0.0.0'
      PORT: '80'

      # Fluxbase connection
      FLUXBASE_PUBLIC_BASE_URL: ${FLUXBASE_PUBLIC_BASE_URL:-http://localhost:8080}
      FLUXBASE_BASE_URL: http://fluxbase:8080
      FLUXBASE_ANON_KEY: ${FLUXBASE_ANON_KEY}
      FLUXBASE_SERVICE_ROLE_KEY: ${FLUXBASE_SERVICE_ROLE_KEY}
      FLUXBASE_ENCRYPTION_KEY: ${FLUXBASE_ENCRYPTION_KEY}

    depends_on:
      fluxbase:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80/health']
      timeout: 5s
      interval: 10s
      retries: 3
    networks:
      - wayli-network

  # PostgreSQL Database (with extensions for Fluxbase)
  postgres:
    image: ghcr.io/fluxbase-eu/fluxbase-postgres:18
    container_name: fluxbase-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fluxbase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fluxbase}
      POSTGRES_DB: ${POSTGRES_DB:-fluxbase}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fluxbase}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wayli-network

  # Fluxbase API
  fluxbase:
    image: ghcr.io/fluxbase-eu/fluxbase:2026.1.22
    container_name: fluxbase
    ports:
      - '8080:8080'
    environment:
      FLUXBASE_DATABASE_HOST: fluxbase-postgres
      FLUXBASE_DATABASE_PORT: 5432
      FLUXBASE_DATABASE_DATABASE: ${POSTGRES_DB:-fluxbase}
      FLUXBASE_DATABASE_USER: ${POSTGRES_USER:-fluxbase}
      FLUXBASE_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-fluxbase}
      FLUXBASE_DATABASE_SSL_MODE: disable

      # Required secrets (generate with: ./scripts/quick-start.sh)
      FLUXBASE_AUTH_JWT_SECRET: ${FLUXBASE_AUTH_JWT_SECRET}
      FLUXBASE_ENCRYPTION_KEY: ${FLUXBASE_ENCRYPTION_KEY}
      FLUXBASE_SECURITY_SETUP_TOKEN: ${FLUXBASE_SECURITY_SETUP_TOKEN}

      # Storage
      FLUXBASE_STORAGE_PROVIDER: local
      FLUXBASE_STORAGE_LOCAL_PATH: /app/storage

      # Enable features
      FLUXBASE_ADMIN_ENABLED: ${FLUXBASE_ADMIN_ENABLED-false}
      FLUXBASE_CORS_ALLOWED_ORIGINS: ${SITE_URL}

    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      # Uncomment if using MinIO:
      # minio:
      #   condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://0.0.0.0:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wayli-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local

networks:
  wayli-network:
    driver: bridge
