# Wayli with Fluxbase - Simplified Backend
# Usage:
#   Start:    docker compose -f docker-compose.fluxbase.yml up
#   Stop:     docker compose -f docker-compose.fluxbase.yml down
#   Destroy:  docker compose -f docker-compose.fluxbase.yml down -v --remove-orphans
#
# Deployment Modes:
#   This setup runs web and worker as separate containers for production scalability.
#   For simpler deployments, you can use combined mode (APP_MODE=combined) to run
#   both web and worker in a single container. See wayli-combined service below.

name: wayli-fluxbase

services:
  # PostgreSQL database with PostGIS
  postgres:
    container_name: wayli-postgres
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wayli}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wayli-network

  # MinIO - S3-compatible object storage
  minio:
    container_name: wayli-minio
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - wayli-network

  # Fluxbase - Single binary BaaS
  fluxbase:
    container_name: wayli-fluxbase
    image: ghcr.io/wayli-app/fluxbase:${FLUXBASE_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${FLUXBASE_PORT:-8080}:8080"
    environment:
      # Database Configuration
      FLUXBASE_DATABASE_HOST: postgres
      FLUXBASE_DATABASE_PORT: 5432
      FLUXBASE_DATABASE_DATABASE: ${POSTGRES_DB:-wayli}
      FLUXBASE_DATABASE_USER: ${POSTGRES_USER:-postgres}
      FLUXBASE_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      FLUXBASE_DATABASE_SSL_MODE: disable

      # User Migrations (your Wayli schema)
      FLUXBASE_DATABASE_USER_MIGRATIONS_PATH: /migrations/user

      # Server Configuration
      FLUXBASE_SERVER_ADDRESS: "0.0.0.0:8080"
      FLUXBASE_BASE_URL: ${PUBLIC_FLUXBASE_BASE_URL:-http://localhost:8080}
      FLUXBASE_DEBUG: "${FLUXBASE_DEBUG:-false}"

      # JWT Configuration
      FLUXBASE_AUTH_JWT_SECRET: ${JWT_SECRET}
      FLUXBASE_AUTH_JWT_EXPIRY: ${FLUXBASE_AUTH_JWT_EXPIRY:-15m}

      # Storage Configuration (S3/MinIO)
      FLUXBASE_STORAGE_PROVIDER: s3
      FLUXBASE_STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-trip-images}
      FLUXBASE_STORAGE_S3_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      FLUXBASE_STORAGE_S3_ENDPOINT: http://minio:9000
      FLUXBASE_STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      FLUXBASE_STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}

      # Realtime Configuration
      FLUXBASE_REALTIME_ENABLED: "true"

      # Edge Functions Configuration
      FLUXBASE_FUNCTIONS_ENABLED: "${FLUXBASE_FUNCTIONS_ENABLED:-true}"
      FLUXBASE_FUNCTIONS_FUNCTIONS_DIR: /app/functions

      # Wayli-specific environment variables for edge functions
      NOMINATIM_ENDPOINT: ${NOMINATIM_ENDPOINT:-https://nominatim.openstreetmap.org}

    volumes:
      # Mount user migrations (Fluxbase format: NNN_name.{up,down}.sql)
      - ./volumes/migrations:/migrations/user:ro
      # Mount edge functions
      - ./volumes/functions:/app/functions:ro
      # Storage volume (if using local storage instead of S3)
      - storage-data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wayli-network

  # Wayli web application
  wayli-web:
    container_name: wayli-web
    image: zehbart/wayli:${WAYLI_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${WAYLI_WEB_PORT:-4000}:80"
    environment:
      NODE_ENV: production
      APP_MODE: web
      HOST: "0.0.0.0"
      PORT: "80"
      PUBLIC_TRUSTED_ORIGINS: ${SITE_URL}

      # Fluxbase connection
      PUBLIC_FLUXBASE_BASE_URL: ${PUBLIC_FLUXBASE_BASE_URL:-http://fluxbase-dev:8080}
      FLUXBASE_BASE_URL: http://fluxbase-dev:8080
      FLUXBASE_ANON_KEY: ${ANON_KEY}
      FLUXBASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}

      # Database (direct access if needed)
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wayli}

    depends_on:
      fluxbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      timeout: 5s
      interval: 10s
      retries: 3
    networks:
      - wayli-network

  #############################################
  # NOTE: Worker service is no longer needed!
  # Fluxbase now handles all job processing via Fluxbase Jobs.
  # The wayli-worker service has been removed.
  #############################################

  #############################################
  # ALTERNATIVE: Combined mode (deprecated - no longer needed)
  # The combined mode is no longer necessary since Fluxbase handles job processing.
  # Use only the wayli-web service above.
  #############################################
  # wayli:
  #   container_name: wayli
  #   image: zehbart/wayli:${WAYLI_VERSION:-latest}
  #   restart: unless-stopped
  #   ports:
  #     - "${WAYLI_WEB_PORT:-4000}:80"
  #   environment:
  #     NODE_ENV: production
  #     APP_MODE: combined
  #     HOST: "0.0.0.0"
  #     PORT: "80"
  #     PUBLIC_TRUSTED_ORIGINS: ${SITE_URL}
  #
  #     # Fluxbase connection
  #     PUBLIC_FLUXBASE_BASE_URL: ${PUBLIC_FLUXBASE_BASE_URL:-http://fluxbase-dev:8080}
  #     FLUXBASE_BASE_URL: http://fluxbase-dev:8080
  #     FLUXBASE_ANON_KEY: ${ANON_KEY}
  #     FLUXBASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
  #     JWT_SECRET: ${JWT_SECRET}
  #
  #     # Database (direct access if needed)
  #     DB_USERNAME: ${POSTGRES_USER:-postgres}
  #     DB_PASSWORD: ${POSTGRES_PASSWORD}
  #     DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wayli}
  #
  #     # Worker-specific
  #     NOMINATIM_ENDPOINT: ${NOMINATIM_ENDPOINT:-https://nominatim.openstreetmap.org}
  #     MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-3}
  #     MAX_JOB_RETRIES: ${MAX_JOB_RETRIES:-3}
  #
  #   depends_on:
  #     fluxbase:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
  #     timeout: 5s
  #     interval: 10s
  #     retries: 3
  #   networks:
  #     - wayli-network

volumes:
  postgres-data:
    driver: local
  minio-data:
    driver: local
  storage-data:
    driver: local

networks:
  wayli-network:
    driver: bridge
